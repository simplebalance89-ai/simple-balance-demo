<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Simple Balance Music</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Nunito', sans-serif;
        background: #0D0D1A;
        color: #FFFEF7;
        min-height: 100vh;
        padding: 20px;
    }
    .admin-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .admin-header h1 {
        font-family: 'Playfair Display', serif;
        font-size: 1.5rem;
        background: linear-gradient(135deg, #D4A017, #FFE082, #D4A017);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .admin-header .back-link {
        color: #8A7A5A;
        text-decoration: none;
        font-size: 0.8rem;
        transition: color 0.2s;
    }
    .admin-header .back-link:hover { color: #D4A017; }
    .refresh-toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.75rem;
        color: #8A7A5A;
    }
    .refresh-toggle label { cursor: pointer; }
    .refresh-toggle input[type="checkbox"] { accent-color: #D4A017; cursor: pointer; }
    .last-refresh { font-size: 0.65rem; color: #555; }

    .section {
        margin-bottom: 24px;
    }
    .section-title {
        font-family: 'Playfair Display', serif;
        font-size: 1rem;
        color: #FFE082;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .section-title .icon { font-size: 1.1rem; }

    /* Server Info */
    .info-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
    }
    .info-card {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 12px;
        padding: 14px;
        text-align: center;
    }
    .info-card .label {
        font-size: 0.6rem;
        color: #8A7A5A;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 4px;
    }
    .info-card .value {
        font-family: 'Playfair Display', serif;
        font-size: 1.1rem;
        font-weight: 700;
        color: #D4A017;
        word-break: break-all;
    }
    .info-card .value.small { font-size: 0.8rem; font-family: 'Nunito', sans-serif; }

    /* Service Health */
    .health-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 10px;
    }
    .health-card {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 12px;
        padding: 14px;
        text-align: center;
    }
    .health-card .svc-name {
        font-size: 0.8rem;
        font-weight: 700;
        color: #FFFEF7;
        margin-bottom: 6px;
    }
    .pill {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 12px;
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.5px;
        text-transform: uppercase;
    }
    .pill.ok { background: rgba(34,197,94,0.15); color: #22c55e; }
    .pill.down { background: rgba(196,30,58,0.15); color: #C41E3A; }
    .pill.done { background: rgba(34,197,94,0.15); color: #22c55e; }
    .pill.failed { background: rgba(196,30,58,0.15); color: #C41E3A; }
    .pill.running { background: rgba(212,160,23,0.15); color: #D4A017; }

    /* Active Jobs */
    .jobs-empty {
        font-size: 0.8rem;
        color: #555;
        padding: 16px;
        text-align: center;
        background: rgba(255,255,255,0.02);
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .job-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        background: rgba(212,160,23,0.06);
        border: 1px solid rgba(212,160,23,0.15);
        border-radius: 10px;
        margin-bottom: 8px;
        animation: pulse-border 2s infinite;
    }
    @keyframes pulse-border {
        0%, 100% { border-color: rgba(212,160,23,0.15); }
        50% { border-color: rgba(212,160,23,0.4); }
    }
    .job-row .job-type {
        font-size: 0.65rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #D4A017;
        min-width: 60px;
    }
    .job-row .job-title {
        flex: 1;
        font-size: 0.82rem;
        color: #FFFEF7;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .job-row .job-status {
        font-size: 0.7rem;
        color: #D4A017;
    }
    .job-row .job-elapsed {
        font-size: 0.7rem;
        color: #8A7A5A;
        min-width: 50px;
        text-align: right;
    }

    /* Job History Table */
    .history-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.78rem;
    }
    .history-table th {
        text-align: left;
        padding: 8px 10px;
        font-size: 0.6rem;
        color: #8A7A5A;
        text-transform: uppercase;
        letter-spacing: 1px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .history-table td {
        padding: 8px 10px;
        border-bottom: 1px solid rgba(255,255,255,0.03);
        color: #ccc;
    }
    .history-table tr:hover td { background: rgba(255,255,255,0.02); }
    .history-table .title-cell {
        max-width: 200px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    /* Quick Stats */
    .stats-row {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
    }
    .stat-item {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 10px;
        padding: 12px 20px;
        text-align: center;
    }
    .stat-item .stat-val {
        font-family: 'Playfair Display', serif;
        font-size: 1.5rem;
        font-weight: 700;
        color: #D4A017;
    }
    .stat-item .stat-lbl {
        font-size: 0.65rem;
        color: #8A7A5A;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-top: 2px;
    }

    .error-banner {
        background: rgba(196,30,58,0.1);
        border: 1px solid rgba(196,30,58,0.3);
        border-radius: 10px;
        padding: 12px 16px;
        font-size: 0.8rem;
        color: #C41E3A;
        text-align: center;
        margin-bottom: 16px;
        display: none;
    }
</style>
</head>
<body>

<div class="admin-header">
    <div>
        <h1>Admin Dashboard</h1>
        <a href="/" class="back-link">&larr; Back to app</a>
    </div>
    <div style="text-align:right;">
        <div class="refresh-toggle">
            <input type="checkbox" id="autoRefresh" checked>
            <label for="autoRefresh">Auto-refresh (10s)</label>
        </div>
        <div class="last-refresh" id="lastRefresh">Loading...</div>
    </div>
</div>

<div class="error-banner" id="errorBanner"></div>

<!-- Quick Stats -->
<div class="section">
    <div class="section-title"><span class="icon">&#x1F4CA;</span> Quick Stats</div>
    <div class="stats-row" id="quickStats">
        <div class="stat-item"><div class="stat-val" id="statSessions">-</div><div class="stat-lbl">Active Sessions</div></div>
        <div class="stat-item"><div class="stat-val" id="statActiveJobs">-</div><div class="stat-lbl">Running Jobs</div></div>
        <div class="stat-item"><div class="stat-val" id="statTotalJobs">-</div><div class="stat-lbl">Total Completed</div></div>
    </div>
</div>

<!-- Server Info -->
<div class="section">
    <div class="section-title"><span class="icon">&#x1F5A5;</span> Server Info</div>
    <div class="info-grid" id="serverInfo">
        <div class="info-card"><div class="label">Uptime</div><div class="value" id="infoUptime">-</div></div>
        <div class="info-card"><div class="label">Git Commit</div><div class="value small" id="infoCommit">-</div></div>
        <div class="info-card"><div class="label">yt-dlp</div><div class="value small" id="infoYtdlp">-</div></div>
        <div class="info-card"><div class="label">ffmpeg</div><div class="value small" id="infoFfmpeg">-</div></div>
        <div class="info-card"><div class="label">Python</div><div class="value small" id="infoPython">-</div></div>
    </div>
</div>

<!-- Service Health -->
<div class="section">
    <div class="section-title"><span class="icon">&#x1F7E2;</span> Service Health</div>
    <div class="health-grid" id="healthGrid"></div>
</div>

<!-- Active Jobs -->
<div class="section">
    <div class="section-title"><span class="icon">&#x26A1;</span> Active Jobs</div>
    <div id="activeJobs"><div class="jobs-empty">No active jobs</div></div>
</div>

<!-- Job History -->
<div class="section">
    <div class="section-title"><span class="icon">&#x1F4CB;</span> Job History</div>
    <div style="overflow-x:auto;">
        <table class="history-table" id="historyTable">
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Title</th>
                    <th>Status</th>
                    <th>Tracks</th>
                    <th>Elapsed</th>
                    <th>Timestamp</th>
                </tr>
            </thead>
            <tbody id="historyBody">
                <tr><td colspan="6" style="text-align:center;color:#555;padding:20px;">No history yet</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
let refreshInterval = null;

async function fetchAdmin() {
    const errorBanner = document.getElementById('errorBanner');
    try {
        const res = await fetch('/api/admin/summary');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        errorBanner.style.display = 'none';
        renderDashboard(data);
    } catch (e) {
        errorBanner.style.display = 'block';
        errorBanner.textContent = 'Failed to fetch admin data: ' + e.message;
    }
    document.getElementById('lastRefresh').textContent = 'Last refresh: ' + new Date().toLocaleTimeString();
}

function renderDashboard(data) {
    // Server Info
    const srv = data.server || {};
    document.getElementById('infoUptime').textContent = srv.uptime || '-';
    document.getElementById('infoCommit').textContent = srv.git_commit ? srv.git_commit.substring(0, 10) : '-';
    document.getElementById('infoYtdlp').textContent = srv.yt_dlp_version || '-';
    document.getElementById('infoFfmpeg').textContent = srv.ffmpeg_version || '-';
    document.getElementById('infoPython').textContent = srv.python_version || '-';

    // Service Health
    const svc = data.services || {};
    const svcNames = {
        azure_openai: 'Azure OpenAI',
        audd: 'AudD',
        replicate: 'Replicate',
        spotify: 'Spotify',
        tidal: 'Tidal'
    };
    const healthGrid = document.getElementById('healthGrid');
    healthGrid.innerHTML = Object.entries(svcNames).map(([key, name]) => {
        const ok = svc[key];
        return `<div class="health-card">
            <div class="svc-name">${name}</div>
            <span class="pill ${ok ? 'ok' : 'down'}">${ok ? 'Connected' : 'Not configured'}</span>
        </div>`;
    }).join('');

    // Active Jobs
    const activeContainer = document.getElementById('activeJobs');
    const dl = data.active_jobs?.downloads || {};
    const dg = data.active_jobs?.digests || {};
    const allActive = [
        ...Object.entries(dl).map(([id, j]) => ({...j, type: 'Download', id})),
        ...Object.entries(dg).map(([id, j]) => ({...j, type: 'Digest', id})),
    ];

    if (allActive.length === 0) {
        activeContainer.innerHTML = '<div class="jobs-empty">No active jobs</div>';
    } else {
        activeContainer.innerHTML = allActive.map(j => {
            const elapsed = j.elapsed ? `${Math.floor(j.elapsed/60)}m ${j.elapsed%60}s` : '-';
            const progress = j.scan_progress ? ` (${j.scan_progress})` : '';
            return `<div class="job-row">
                <span class="job-type">${j.type}</span>
                <span class="job-title">${j.title || 'Unknown'}</span>
                <span class="job-status"><span class="pill running">${j.status}${progress}</span></span>
                <span class="job-elapsed">${elapsed}</span>
            </div>`;
        }).join('');
    }

    // Job History
    const history = data.job_history || [];
    const tbody = document.getElementById('historyBody');
    if (history.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#555;padding:20px;">No history yet</td></tr>';
    } else {
        tbody.innerHTML = history.slice().reverse().map(h => {
            const statusClass = h.status === 'done' ? 'done' : 'failed';
            const tracks = h.tracks_found !== undefined ? h.tracks_found : '-';
            const elapsed = h.elapsed ? `${Math.floor(h.elapsed/60)}m ${h.elapsed%60}s` : '-';
            return `<tr>
                <td style="text-transform:capitalize;">${h.type || '-'}</td>
                <td class="title-cell" title="${(h.title || '').replace(/"/g, '&quot;')}">${h.title || '-'}</td>
                <td><span class="pill ${statusClass}">${h.status}</span></td>
                <td>${tracks}</td>
                <td>${elapsed}</td>
                <td style="font-size:0.7rem;color:#666;">${h.timestamp || '-'}</td>
            </tr>`;
        }).join('');
    }

    // Quick Stats
    document.getElementById('statSessions').textContent = data.spotify_sessions_active || 0;
    document.getElementById('statActiveJobs').textContent = allActive.length;
    document.getElementById('statTotalJobs').textContent = history.length;
}

function setupAutoRefresh() {
    const checkbox = document.getElementById('autoRefresh');
    checkbox.addEventListener('change', () => {
        if (checkbox.checked) {
            refreshInterval = setInterval(fetchAdmin, 10000);
        } else {
            clearInterval(refreshInterval);
            refreshInterval = null;
        }
    });
    refreshInterval = setInterval(fetchAdmin, 10000);
}

// Init
fetchAdmin();
setupAutoRefresh();
</script>
</body>
</html>
