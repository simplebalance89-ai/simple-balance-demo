<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0D0D1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="s / b">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="version" content="3.0">
<meta property="og:title" content="simple / balance — AI Production Suite">
<meta property="og:description" content="AI-powered music production suite. Create beats, master tracks, separate stems, and build DJ sets.">
<meta property="og:type" content="website">
<title>simple / balance — AI Production Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Nunito:wght@300;400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/main.css">
</head>
<body>

<!-- Toast -->
<div class="sbm-toast" id="sbmToast"></div>

<!-- Full Screen Login Gate -->
<div id="loginGate" style="position:fixed;inset:0;z-index:9999;background:#0D0D1A;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;">
    <div style="text-align:center;margin-bottom:32px;">
        <div style="font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:#FFE082;margin-bottom:4px;">simple / balance</div>
        <div style="font-size:0.75rem;color:#8A7A5A;letter-spacing:2px;text-transform:uppercase;">AI Production Suite</div>
    </div>
    <div style="width:100%;max-width:360px;">
        <div style="display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.1);">
            <div id="gateTabSignin" onclick="switchGateTab('signin')" style="flex:1;text-align:center;padding:10px;cursor:pointer;font-weight:700;font-size:0.85rem;color:#FFE082;border-bottom:2px solid #FFE082;">Sign In</div>
            <div id="gateTabRegister" onclick="switchGateTab('register')" style="flex:1;text-align:center;padding:10px;cursor:pointer;font-weight:700;font-size:0.85rem;color:rgba(255,255,255,0.4);border-bottom:2px solid transparent;">Register</div>
        </div>
        <div id="gateError" style="color:#EF4444;font-size:0.8rem;text-align:center;min-height:20px;margin-bottom:8px;"></div>
        <div id="gateSignin">
            <select id="gateName" style="width:100%;padding:14px;background:#1a1a2e;border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#fff;font-size:0.9rem;margin-bottom:10px;font-family:inherit;">
                <option value="">Select your name...</option>
            </select>
            <input type="password" id="gatePin" placeholder="4-digit PIN" maxlength="4" inputmode="numeric" pattern="[0-9]*" style="width:100%;padding:14px;background:#1a1a2e;border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#fff;font-size:0.9rem;margin-bottom:14px;font-family:inherit;box-sizing:border-box;" onkeydown="if(event.key==='Enter')gateLogin()">
            <button onclick="gateLogin()" style="width:100%;padding:14px;background:linear-gradient(135deg,#D4A017,#FFE082);color:#0D0D1A;border:none;border-radius:10px;font-weight:800;font-size:1rem;cursor:pointer;font-family:inherit;">SIGN IN</button>
        </div>
        <div id="gateRegister" style="display:none;">
            <input type="text" id="gateRegName" placeholder="Your producer name" style="width:100%;padding:14px;background:#1a1a2e;border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#fff;font-size:0.9rem;margin-bottom:10px;font-family:inherit;box-sizing:border-box;">
            <input type="password" id="gateRegPin" placeholder="4-digit PIN" maxlength="4" inputmode="numeric" pattern="[0-9]*" style="width:100%;padding:14px;background:#1a1a2e;border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#fff;font-size:0.9rem;margin-bottom:12px;font-family:inherit;box-sizing:border-box;">
            <div style="margin-bottom:14px;">
                <div style="font-size:0.7rem;color:rgba(255,255,255,0.4);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;">Pick your color</div>
                <div id="gateColors" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
            </div>
            <button onclick="gateRegister()" style="width:100%;padding:14px;background:linear-gradient(135deg,#D4A017,#FFE082);color:#0D0D1A;border:none;border-radius:10px;font-weight:800;font-size:1rem;cursor:pointer;font-family:inherit;">CREATE PROFILE</button>
        </div>
    </div>
    <button onclick="clearAllCache()" style="margin-top:24px;background:none;border:none;color:#444;font-size:0.6rem;cursor:pointer;">Clear Cache</button>
</div>

<!-- Top Bar (hidden until login) -->
<div class="top-bar" id="topBar" style="display:none;">
    <div class="topbar-left">
        <span class="topbar-brand">s / b</span>
    </div>
    <div class="topbar-right">
        <button onclick="clearAllCache()" class="topbar-action">Clear Cache</button>
        <div id="authHeaderBtn" class="topbar-user"></div>
    </div>
</div>

<!-- Tool Tabs (Edge Crew style — hidden until login) -->
<div class="tool-tabs-wrap" id="toolTabsWrap" style="display:none;">
    <div class="tool-tabs" id="toolTabs"></div>
</div>

<!-- Main Content (hidden until login) -->
<main id="app" style="display:none;">
    <div id="contentArea" class="content-area"></div>
</main>

<!-- Scripts (order matters: utils first, then auth, then services, then tools, then profile, then library, then app last) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/static/js/utils.js"></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/spotify.js"></script>
<script src="/static/js/tidal.js"></script>
<script src="/static/js/tools.js"></script>
<script src="/static/js/profile.js"></script>
<script src="/static/js/library.js"></script>
<script src="/static/js/app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
window.onerror = function(msg, url, line, col, error) {
  fetch('/api/errors', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({source:'frontend', error:msg, stack: error ? error.stack : url+':'+line+':'+col})
  }).catch(function(){});
};
window.addEventListener('unhandledrejection', function(e) {
  fetch('/api/errors', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({source:'frontend', error: e.reason ? (e.reason.message||String(e.reason)) : 'Unhandled rejection', stack: e.reason ? e.reason.stack : ''})
  }).catch(function(){});
});
</script>
</body>
</html>
