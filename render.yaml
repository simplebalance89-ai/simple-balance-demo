services:
  - type: web
    name: simple-balance-demo
    runtime: docker
    repo: https://github.com/simplebalance89-ai/simple-balance-demo
    region: oregon
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_KEY
        sync: false
      - key: AZURE_OPENAI_MODEL
        value: gpt-4o
      - key: AUDD_API_TOKEN
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: TIDAL_CLIENT_ID
        sync: false
      - key: TIDAL_CLIENT_SECRET
        sync: false
      - key: TIDAL_REDIRECT_URI
        value: https://simple-balance-demo.onrender.com/api/tidal/callback
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
